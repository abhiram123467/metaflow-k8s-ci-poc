name: Metaflow Kubernetes Integration Tests

on:
  push:
    branches: [ main ]

jobs:
  k8s-integration:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ['3.9', '3.10', '3.11']
      fail-fast: false
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install dependencies
        run: pip install metaflow pytest

      - name: Setup Kind cluster
        uses: helm/kind-action@v1.8.0
        with:
          cluster_name: metaflow-ci

      - name: Verify cluster
        run: kubectl get nodes

      - name: Create smoke test
        run: |
          cat > smoke.py << 'PYEOF'
from metaflow import FlowSpec, step
class SmokeFlow(FlowSpec):
    @step
    def start(self):
        print("GSoC 2026 Abhiram - K8s CI working!")
        self.next(self.end)
    @step
    def end(self):
        print("All good!")
if __name__ == "__main__":
    SmokeFlow()
PYEOF

      - name: Run smoke test
        run: python smoke.py run
